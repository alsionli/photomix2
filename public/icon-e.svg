<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- E: Camera shutter + music (photo+mix concept) -->
  <!-- Outer circle -->
  <rect x="5" y="0" width="6" height="1" fill="#333"/>
  <rect x="3" y="1" width="2" height="1" fill="#333"/>
  <rect x="11" y="1" width="2" height="1" fill="#333"/>
  <rect x="2" y="2" width="1" height="1" fill="#333"/>
  <rect x="13" y="2" width="1" height="1" fill="#333"/>
  <rect x="1" y="3" width="1" height="2" fill="#333"/>
  <rect x="14" y="3" width="1" height="2" fill="#333"/>
  <rect x="0" y="5" width="1" height="6" fill="#333"/>
  <rect x="15" y="5" width="1" height="6" fill="#333"/>
  <rect x="1" y="11" width="1" height="2" fill="#333"/>
  <rect x="14" y="11" width="1" height="2" fill="#333"/>
  <rect x="2" y="13" width="1" height="1" fill="#333"/>
  <rect x="13" y="13" width="1" height="1" fill="#333"/>
  <rect x="3" y="14" width="2" height="1" fill="#333"/>
  <rect x="11" y="14" width="2" height="1" fill="#333"/>
  <rect x="5" y="15" width="6" height="1" fill="#333"/>
  <!-- Shutter blades (3 lines through center) -->
  <rect x="7" y="3" width="2" height="4" fill="#333"/>
  <rect x="3" y="9" width="4" height="2" fill="#333"/>
  <rect x="9" y="9" width="4" height="2" fill="#333"/>
  <!-- Center dot -->
  <rect x="7" y="7" width="2" height="2" fill="#333"/>
</svg>
